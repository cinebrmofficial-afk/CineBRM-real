<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRM Pro Max</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
</head>
<body>

<header>
    <img src="https://i.ibb.co/XZpqHLfz/1000007315.jpg" alt="BRM Pro Max Logo" class="logo-img">
    <div class="search-box">
        <input type="text" placeholder="Procurar...">
        <i class="fas fa-search" style="color:var(--accent)"></i>
    </div>
</header>

<div id="p-home" class="page active">
    <div class="hero" id="heroSlide" onclick="openPlayer('Beekeeper')">
        <div class="info-box"><h2>The Beekeeper</h2><p>2025 Action ⬇️</p></div>
    </div>
    <div id="cat-list"></div>
</div>

<div id="p-premium" class="page">
    <h2>Premium Features</h2>
    <button id="activate-premium-btn" onclick="activatePremium()">Ativar Premium</button>
</div>

<div id="p-downloads" class="page">
    <h2>Meus Downloads</h2>
    <div id="downloads-list"></div>
</div>

<div id="p-me" class="page">
    <h2>Configurações</h2>
    <small>ID: 526097803</small>
    <div><span>Modo Família</span><div class="switch"></div></div>
</div>

<nav>
    <div class="nav-link active" onclick="nav('p-home')"><i class="fas fa-globe"></i>Início</div>
    <div class="nav-link" onclick="nav('p-downloads')"><i class="fas fa-bolt"></i>Downloads</div>
    <div class="nav-link" onclick="nav('p-premium')"><i class="fas fa-trophy"></i>Premium</div>
    <div class="nav-link" onclick="nav('p-me')"><i class="fas fa-user-astronaut"></i>Me</div>
</nav>

<script src="script.js"></script>
</body>
</html>
